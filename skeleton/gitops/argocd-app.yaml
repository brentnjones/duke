apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.appName }}-${{ values.environment }}
  namespace: openshift-gitops
  labels:
    app: ${{ values.appName }}
    environment: ${{ values.environment }}
    app.kubernetes.io/managed-by: rhdh
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ${{ values.environment }}
  source:
    repoURL: ${{ values.repoUrl }}
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: ${{ values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # namespace created by the template
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # cert-manager injects fields; ignore them to prevent sync loops
    - group: cert-manager.io
      kind: Certificate
      jsonPointers:
        - /status
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host
        - /status
